scenario: experiment_6
domain:
  t_final: 21600.0         # 6 hours
physics:
  g: 1.0
  inflow: null
  n_manning: 0.03
  u_const: 0.0
device:
  dtype: float32
  early_stop_min_epochs: 1000
  early_stop_patience: 3000
numerics:
  eps: 1.0e-06
training:
  epochs: 2000
  seed: 42
  learning_rate: 0.0006984150930531603
  batch_size: 256
  reduce_on_plateau:
    factor: 0.5
    patience: 5
    rtol: 1.0e-04
    atol: 0.0
    cooldown: 1
    accumulation_factor: 2
    min_scale: 1.0e-04
model:
  name: DGMNetwork
  output_dim: 3
  bias_init: 0.0
  width: 256
  depth: 5
  
# --- CRITICAL FIX: Increased Sample Counts ---
sampling:
  n_points_pde: 50000    # Increased to cover 48h simulation
  n_points_ic: 4000      # Sufficient for 2000x2000m area
  n_points_bc_domain: 50000 # Sufficient for time-varying BCs
  n_points_bc_inflow: 2000
  n_points_bc_building: 10000
loss_weights:
  pde_weight: 10.0
  ic_weight: 4.21261832e-05
  bc_weight: 0.241
  neg_h_weight: 1.50177776e-05
  data_weight: 10.0
gradnorm:
  enable: false
data_free: false

reporting:
  epoch_freq: 2
# --- REQUIRED: Needed for folder naming ---
CONFIG_PATH: configs/train/experiment_6_dgm_final.yaml

