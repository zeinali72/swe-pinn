experiment:
  name: experiment_6

scenario: experiment_6
data:
  root_dir: data
  training_file: training_dataset_sample.npy
  validation_file: validation_gauges_ground_truth.npy

sampling_defaults:
  n_points_pde: 1000
  n_points_ic: 100
  n_points_bc_domain: 100
  n_points_bc_inflow: 100

domain:
  lx: 1000.0
  ly: 2000.0
  t_final: 18000.0         # 5 hours
boundary_conditions:
  inflow_discharge_width: 100.0
  left_inflow_segment:
    y_start: 990.0
    y_end: 1010.0

physics:
  g: 9.81
  inflow: null
  n_manning: 0.05
  u_const: 0.0
device:
  dtype: float32
  early_stop_min_epochs: 1000
  early_stop_patience: 3000
numerics:
  eps: 1.0e-06
training:
  epochs: 2000
  seed: 42
  learning_rate: 0.0006984150930531603
  batch_size: 256
  reduce_on_plateau:
    factor: 0.5
    patience: 5
    rtol: 1.0e-04
    atol: 0.0
    cooldown: 1
    accumulation_factor: 2
    min_scale: 1.0e-04
model:
  name: DGMNetwork
  output_dim: 3
  bias_init: 0.0
  width: 512
  depth: 5
  ff_dims: 256
  fourier_scale: 6.138224643110013
# --- CRITICAL FIX: Increased Sample Counts ---
sampling:
  n_points_pde: 80000    # Increased to cover 48h simulation
  n_points_ic: 4000      # Sufficient for 2000x2000m area
  n_points_bc_domain: 30000 # Sufficient for time-varying BCs
  n_points_bc_inflow: 1000
loss_weights:
  pde_weight: 1.0
  ic_weight: 0.02411
  bc_weight: 10.0
  neg_h_weight: 0.000002411
  data_weight: 0.8
gradnorm:
  enable: false
data_free: false

reporting:
  epoch_freq: 20
# --- REQUIRED: Needed for folder naming ---
CONFIG_PATH: configs/train/test4_dgm_final.yaml

