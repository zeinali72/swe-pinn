scenario: benchmark_test_3
domain:
  lx: 300.0
  ly: 100.0
  t_final: 900.0         # 15 minutes
physics:
  g: 9.81
  inflow: null
  n_manning: 0.01
device:
  dtype: float32
  early_stop_min_epochs: 1000
  early_stop_patience: 3000
numerics:
  eps: 1.0e-06
training:
  epochs: 2000
  seed: 42
  learning_rate: 0.0006984150930531603
  batch_size: 256
  reduce_on_plateau:
    factor: 0.5
    patience: 5
    rtol: 1.0e-04
    atol: 0.0
    cooldown: 1
    accumulation_factor: 2
    min_scale: 1.0e-04
model:
  name: DGMNetwork
  output_dim: 3
  bias_init: 0.0
  width: 512
  depth: 5
  ff_dims: 256
  fourier_scale: 6.138224643110013
# --- CRITICAL FIX: Increased Sample Counts ---
sampling:
  n_points_pde: 80000    # Increased to cover 48h simulation
  n_points_ic: 4000      # Sufficient for 2000x2000m area
  n_points_bc_domain: 30000 # Sufficient for time-varying BCs
loss_weights:
  pde_weight: 100.0
  ic_weight: 0.02411
  bc_weight: 0.2411
  neg_h_weight: 0.000002411
  data_weight: 1.0
gradnorm:
  enable: false
data_free: false

reporting:
  epoch_freq: 20
# --- REQUIRED: Needed for folder naming ---
CONFIG_PATH: configs/train/test3_dgm_final.yaml

