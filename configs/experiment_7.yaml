experiment:
  name: experiment_7

scenario: experiment_7
data:
  root_dir: data
  training_file: training_dataset_sample.npy
  validation_file: validation_gauges_ground_truth.npy

sampling_defaults:
  n_points_pde: 1000
  n_points_ic: 100
  n_points_bc_domain: 100
  n_points_bc_inflow: 100

domain:
  t_final: 108000.0         # 30 hours
boundary_conditions:
  inflow_discharge_width: 100.0

physics:
  g: 1.0
  inflow: null
  n_manning: 0.04
  u_const: 0.0
device:
  dtype: float32
  early_stop_min_epochs: 1000
  early_stop_patience: 3000
numerics:
  eps: 1.0e-06
  min_depth: 0.005
training:
  epochs: 2000
  seed: 42
  learning_rate: 0.0006984150930531603
  batch_size: 256
  reduce_on_plateau:
    factor: 0.5
    patience: 5
    rtol: 1.0e-04
    atol: 0.0
    cooldown: 1
    accumulation_factor: 2
    min_scale: 1.0e-04
model:
  name: DGMNetwork
  output_dim: 3
  bias_init: 0.0
  width: 256
  depth: 5
  output_scales: [6.0, 2.0, 2.0]
  
# --- CRITICAL FIX: Increased Sample Counts ---
sampling:
  n_points_pde: 150000    # Increased to cover 48h simulation
  n_points_ic: 4000      # Sufficient for 2000x2000m area
  n_points_bc_domain: 30000 # Sufficient for time-varying BCs
  n_points_bc_inflow: 1000
loss_weights:
  pde_weight: 1.0
  ic_weight: 4.21261832e-05
  bc_weight: 2.60722306e-03
  neg_h_weight: 1.50177776e-05
  data_weight: 1.0
gradnorm:
  enable: false
data_free: true

reporting:
  epoch_freq: 2
# --- REQUIRED: Needed for folder naming ---
CONFIG_PATH: configs/train/test5_dgm_final.yaml

