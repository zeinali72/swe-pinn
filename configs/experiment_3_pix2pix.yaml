CONFIG_PATH: "configs/pix2pix_test1.yaml"
scenario: experiment_3

domain:
  lx: 700.0
  ly: 100.0
  t_final: 72000.0

data:
  nx: 256
  ny: 64

model:
  filters: 32
  n_downsample: 4
  n_res_blocks: 8
  compute_dtype: "float32"     # big VRAM + speed win on Ampere+
  use_remat: false          # turn on only if still OOM

training:
  seed: 42
  epochs: 10000
  batch_size: 4

# Causal Training Parameters
  causal_chunks: 8      # Number of time chunks
  causal_epsilon: 1.0   # Causal weight decay factor

  learning_rate: 0.00001

  # Time grid sampling (your nt requirement)
  nt: 10
  time_sampling: "grid_sweep"   # deterministic coverage across epochs

  # Patch training (key for convergence + VRAM)
  use_patches: false
  patch_nx: 256
  patch_ny: 64                # divisible by 8 (2**n_downsample)
  # If OOM: set patch_ny=64 or batch_size=2

numerics:
  eps: 1.0e-6

physics:
  g: 9.81
  n_manning: 0.03
  ic_eta0: 9.7
  ic_t_window: 10.0

loss_weights:
  pde_weight: 1000.0
  bc_weight: 1.0
  ic_weight: 10.0
  neg_h_weight: 10.0

reporting:
  epoch_freq: 2
  val_freq: 1

device:
  dtype: "float32"

