# Ablation A0 — baseline: input-normalized only, MSE loss, no output non-dim.
# Differs from experiment_1_nondim.yaml (A1) by exactly ONE variable:
# scaling.enabled: false. Every other hyperparameter matches §4.1 of
# docs/experiment_1_ablation_design.md so the A0 → A1 comparison isolates
# the effect of non-dimensionalization alone.
training:
  seed: 42
  epochs: 20000
  learning_rate: 1.0e-4
  batch_size: 256
  reduce_on_plateau:
    factor: 0.5
    patience: 50
    rtol: 1.0e-3
    atol: 0.0
    cooldown: 5
    accumulation_factor: 2
    min_scale: 1.0e-3
model:
  name: MLP
  output_dim: 3
  width: 512
  depth: 4
domain:
  lx: 1200.0
  ly: 100.0
  t_final: 3600.0
physics:
  u_const: 0.29
  n_manning: 0.03
  inflow: null
  g: 9.81
scaling:
  enabled: false
  H0: 1.0
data_free: true
train_grid:
  n_gauges: 1
  dt_data: 10.0
loss_weights:
  pde_weight: 1.0
  ic_weight: 1.0
  bc_weight: 10.0
  neg_h_weight: 1.0
  data_weight: 0.0
plotting:
  nx_val: 101
  t_const_val: 1800.0
  y_const_plot: 0
  plot_resolution: 150
device:
  dtype: float32
  early_stop_min_epochs: 25000
  early_stop_patience: 3000
numerics:
  eps: 1.0e-6
validation_grid:
  n_points_val: 20000
sampling:
  n_points_pde: 10000
  n_points_ic: 10000
  n_points_bc_domain: 10000
