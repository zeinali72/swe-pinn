# Ablation A6.1 — MSE loss + dense (100k) collocation sampling + float64.
# Companion to A6 (L2+ε+dense+float64). Tests whether float64 changes MSE at
# dense sampling. Expected outcome: NSE matches A5 (~0.97) within noise, at
# ~20× wall-clock cost. MSE has no √(0) singularity so float64 should be
# numerically redundant.
#
# Budget shortened to 5000 epochs — empirically A5 plateaus by epoch ~2500
# and A6 (float64+L2) plateaus by ~3000. 20000 epochs at float64 would cost
# ~38 h and return the same answer.
training:
  seed: 42
  epochs: 5000
  learning_rate: 1.0e-4
  batch_size: 256
  reduce_on_plateau:
    factor: 0.5
    patience: 50
    rtol: 1.0e-3
    atol: 0.0
    cooldown: 5
    accumulation_factor: 2
    min_scale: 1.0e-3
model:
  name: MLP
  output_dim: 3
  width: 512
  depth: 4
domain:
  lx: 1200.0
  ly: 100.0
  t_final: 3600.0
physics:
  u_const: 0.29
  n_manning: 0.03
  inflow: null
  g: 9.81
scaling:
  enabled: true
  H0: 1.0
data_free: true
train_grid:
  n_gauges: 1
  dt_data: 10.0
loss_weights:
  pde_weight: 1.0
  ic_weight: 1.0
  bc_weight: 10.0
  neg_h_weight: 1.0
  data_weight: 0.0
plotting:
  nx_val: 101
  t_const_val: 1800.0
  y_const_plot: 0
  plot_resolution: 150
device:
  dtype: float64
  early_stop_min_epochs: 10000
  early_stop_patience: 3000
numerics:
  eps: 1.0e-6
validation_grid:
  n_points_val: 20000
sampling:
  n_points_pde: 100000
  n_points_ic: 10000
  n_points_bc_domain: 10000
